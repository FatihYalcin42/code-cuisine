<header class="impressum-header">
  <a class="impressum-brand" routerLink="/" aria-label="Back to home page">
    <object
      class="impressum-brand-media"
      data="/Icons/Capa_green.svg?v=1"
      type="image/svg+xml"
      aria-label="Code-a-Cuisine"
    >
      <span class="impressum-brand-fallback">Code a Cuisine</span>
    </object>
  </a>
</header>

<main class="impressum-page" aria-labelledby="impressum-title">
  <section class="impressum-card">
    <p class="impressum-kicker">Legal notice</p>
    <h1 id="impressum-title" class="impressum-title">Impressum</h1>
    <p class="impressum-copy">
      Replace the placeholder details below with the legal information that should appear in your
      final submission.
    </p>

    <dl class="impressum-details">
      <div class="impressum-row">
        <dt>Name</dt>
        <dd>Your full name</dd>
      </div>
      <div class="impressum-row">
        <dt>Address</dt>
        <dd>Street, postal code, city</dd>
      </div>
      <div class="impressum-row">
        <dt>Email</dt>
        <dd>your@email.com</dd>
      </div>
      <div class="impressum-row">
        <dt>Responsible for content</dt>
        <dd>Your full name</dd>
      </div>
    </dl>

    <a class="impressum-back-link" routerLink="/">Back to home</a>
  </section>
</main>
