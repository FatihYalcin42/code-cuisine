<header class="generate-header">
  <a class="generate-brand" routerLink="/" aria-label="Zur Hero-Seite">
    <object
      class="generate-brand-media"
      data="/Icons/Capa_green.svg?v=1"
      type="image/svg+xml"
      aria-label="Code-a-Cuisine"
    >
      <span class="generate-brand-fallback">Code a Cuisine</span>
    </object>
  </a>

  <div class="generate-intro">
    <h1 class="generate-title">Generate recipe</h1>
    <p class="generate-subtitle">
      Got random stuff in your kitchen? Pop it in&mdash;we've got the perfect recipe waiting.
    </p>
  </div>
</header>

<main class="generate-page-content" aria-label="Generate recipe page">
  <div class="generate-panels">
    <section class="ingredient-panel" aria-labelledby="ingredient-panel-title">
      <div class="ingredient-panel-header">
        <label class="ingredient-label" id="ingredient-panel-title" for="ingredient-input">
          Ingredient:
        </label>

        <div class="serving-size">
          <label class="serving-size-label" for="serving-size-input">Serving size</label>
        </div>
      </div>

      <div class="ingredient-panel-controls">
        <input class="ingredient-input" id="ingredient-input" type="text" />

        <div class="serving-size-controls">
          <input class="serving-size-input" id="serving-size-input" type="text" value="100" />
          <button class="serving-size-unit" type="button">gram</button>
        </div>

        <button class="ingredient-add" type="button" aria-label="Add ingredient">
          <img src="/Icons/add_2.svg" width="24" height="24" alt="" aria-hidden="true" />
        </button>
      </div>
    </section>

    <section class="ingredient-list-panel" aria-label="List of your ingredients"></section>
  </div>
</main>
