<header class="cookbook-header">
  <div class="cookbook-header-branding">
    <a class="cookbook-brand" routerLink="/" aria-label="Back to home page">
      <object
        class="cookbook-brand-media"
        data="/Icons/Capa_green.svg?v=1"
        type="image/svg+xml"
        aria-label="Code-a-Cuisine"
      >
        <span class="cookbook-brand-fallback">Code a Cuisine</span>
      </object>
    </a>

    <a class="cookbook-back-link" routerLink="/" aria-label="Back to home">
      <img src="/Icons/Arrow 11.svg" width="24" height="24" alt="" aria-hidden="true" />
      <span>Back</span>
    </a>
  </div>
</header>

<main class="cookbook-page" aria-label="Cookbook page">
  <section class="cookbook-shell">
    <section class="cookbook-frame" aria-label="Cookbook content container">
      <div class="cookbook-frame-main">
        <div class="cookbook-frame-copy">
          <h1 class="cookbook-title">Cookbook</h1>
          <p class="cookbook-description">
            From quick bites to gourmet delights, explore them all in our ultimate cookbook and
            get inspired for your next culinary adventure.
          </p>
        </div>

        <section class="cookbook-liked" aria-labelledby="cookbook-liked-title">
          <div class="cookbook-liked-heading">
            <h2 class="cookbook-liked-title" id="cookbook-liked-title">Most liked recipes</h2>
            <img src="/Icons/Heart.svg" width="32" height="32" alt="" aria-hidden="true" />
          </div>

          <div class="cookbook-liked-scroll" aria-label="Most liked recipes">
            @for (recipe of likedRecipes; track recipe.title) {
              <article class="cookbook-liked-card">
                <div class="cookbook-liked-card-meta">
                  <span>{{ recipe.prepTime }}</span>
                  <span class="cookbook-liked-card-likes">{{ recipe.likes }}</span>
                </div>

                <h3 class="cookbook-liked-card-title">{{ recipe.title }}</h3>
              </article>
            }
          </div>
        </section>
      </div>
    </section>
  </section>
</main>
