<header class="site-header">
  <div class="brand-mark" aria-label="Code-a-Cuisine Logo">
    <object
      class="brand-mark-media"
      data="Icons/Capa_2.svg?v=1"
      type="image/svg+xml"
      aria-label="Code-a-Cuisine"
    >
      <span class="brand-mark-fallback">Code a Cuisine</span>
    </object>
  </div>
</header>

<main class="page-shell" aria-label="Startseite">
  <section class="hero-copy" aria-labelledby="hero-title">
    <p class="hero-kicker">AI-Powered recipe generator</p>
    <h1 class="hero-title" id="hero-title">
      Code <span class="hero-title-accent">à</span> Cuisine
    </h1>
    <button class="hero-cta" type="button" routerLink="/generate-recipe">Get started</button>
  </section>

  <div class="hero-links">
    <p class="hero-prompt">Hungry for inspiration?</p>
    <a class="hero-cookbook-link" routerLink="/cookbook">
      <span>Go to cookbook</span>
      <img src="Icons/Arrow 18.svg" alt="" aria-hidden="true" />
    </a>
    <a class="hero-impressum-link" routerLink="/impressum">Impressum</a>
  </div>

  <div class="hero-visual" aria-hidden="true"></div>
</main>
